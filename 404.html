<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SmartBudget</title>
  <script>
    // GitHub Pages SPA redirect
    // Encodes the full path into a query-string so index.html can recover it.
    // Credit: https://github.com/rafgraph/spa-github-pages
    var l = window.location;
    var segmentCount = 1; // set to 1 for repos at user.github.io/repo
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
