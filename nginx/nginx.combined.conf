server {
    listen 80;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options        "DENY"                            always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=()"   always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none';" always;
    # Uncomment the line below once HTTPS/TLS is configured on this server:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upload size limit ───────────────────────────────────────────────────────
    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to uvicorn running on localhost
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
