# Production compose — uses pre-built images from Docker Hub.
# Copy .env.example → .env and fill in your values before running.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:15-alpine
    container_name: budget_db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ${DOCKER_USER}/smart-budget-backend:latest
    container_name: budget_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db

  frontend:
    image: ${DOCKER_USER}/smart-budget-frontend:latest
    container_name: budget_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
