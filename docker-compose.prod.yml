# Production compose — single container with postgres + backend + frontend.
# Copy .env.example → .env and fill in your values before running.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: ${DOCKER_USER}/smart-budget:latest
    container_name: budget_app
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-budget_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-budget_db}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      # Telegram bot — leave BOT_TOKEN blank to disable the bot entirely
      - BOT_TOKEN=${BOT_TOKEN:-}
      # S3 backups — leave blank to keep backups local only
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - S3_BACKUP_BUCKET=${S3_BACKUP_BUCKET:-}
    ports:
      - "80:80"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - uploads:/uploads        # persists PDF uploads + bot sessions (sessions.json lives here)
      - model_cache:/root/.cache # persists docling/HuggingFace model downloads (~1 GB, one-time)

volumes:
  postgres_data:
  uploads:
  model_cache:
