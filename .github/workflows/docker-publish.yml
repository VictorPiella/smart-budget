name: Build & Push to Docker Hub

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build-and-push:
    name: Build image and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker Hub login ────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Buildx for multi-platform / cache support ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Combined app image (nginx + uvicorn in one container) ───────────────
      - name: Build and push combined app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/smart-budget:latest
            ${{ secrets.DOCKER_USER }}/smart-budget:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-pages:
    name: Deploy landing to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push to gh-pages branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          # Set this to your GitHub Pages URL, e.g. https://youruser.github.io/PersonalBudget
          # Leave as "." to deploy at the repo root path
          PUBLIC_URL: "."
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/build

  deploy:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only deploy when PROD_HOST secret is configured (secrets unavailable in job-level if;
    # use a repository variable DEPLOY_ENABLED=true to gate this job instead)
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/smartbudget
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
