name: Build & Push to Docker Hub

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build-and-push:
    name: Build images and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker Hub login ────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Buildx for multi-platform / cache support ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/smart-budget-backend:latest
            ${{ secrets.DOCKER_USER }}/smart-budget-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Frontend (multi-stage: React build → nginx) ─────────────────────────
      # context is repo root so the Dockerfile can access both
      # frontend/ (React source) and nginx/ (prod nginx config)
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/smart-budget-frontend:latest
            ${{ secrets.DOCKER_USER }}/smart-budget-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
