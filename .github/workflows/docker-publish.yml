name: Build & Push to Docker Hub

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build-and-push:
    name: Build image and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker Hub login ────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Buildx for multi-platform / cache support ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Combined app image (nginx + uvicorn in one container) ───────────────
      - name: Build and push combined app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/smart-budget:latest
            ${{ secrets.DOCKER_USER }}/smart-budget:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
